name: Bug report
description: Report a reproducible defect in the engine, pipeline, docs, or tooling.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One concise sentence describing what broke.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include exact commands and fixture/provider setup.
      placeholder: |
        1. npm install
        2. npm run demo:fixture
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "22.19.0"
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, generated manifests, or redacted provider request ids.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and how severe is it?
